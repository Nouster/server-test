<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Produits - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <!-- Navigation -->
    <nav class="bg-indigo-600 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center">
                <i class="fas fa-boxes mr-3"></i> StockManager Pro
            </h1>
            <span class="text-sm bg-indigo-500 px-3 py-1 rounded-full">Statut: Connecté</span>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <!-- Header & Action -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-extrabold text-gray-800">Catalogue Produits</h2>
                <p class="text-gray-500">Gérez votre inventaire en temps réel</p>
            </div>
            <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg shadow-md transition-all flex items-center font-semibold">
                <i class="fas fa-plus mr-2"></i> Ajouter un produit
            </button>
        </div>

        <!-- Dashboard Stats (Placeholder) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center">
                <div class="bg-blue-100 p-4 rounded-lg mr-4">
                    <i class="fas fa-box text-blue-600 text-xl"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 uppercase font-bold tracking-wider">Total Produits</p>
                    <p id="total-products" class="text-2xl font-bold text-gray-800">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center">
                <div class="bg-green-100 p-4 rounded-lg mr-4">
                    <i class="fas fa-euro-sign text-green-600 text-xl"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 uppercase font-bold tracking-wider">Valeur Stock</p>
                    <p id="total-value" class="text-2xl font-bold text-gray-800">0.00 €</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center">
                <div class="bg-orange-100 p-4 rounded-lg mr-4">
                    <i class="fas fa-exclamation-triangle text-orange-600 text-xl"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 uppercase font-bold tracking-wider">Alertes Stock</p>
                    <p id="low-stock" class="text-2xl font-bold text-gray-800">0</p>
                </div>
            </div>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-600 uppercase text-xs font-semibold">
                        <tr>
                            <th class="px-6 py-4">Produit</th>
                            <th class="px-6 py-4">Description</th>
                            <th class="px-6 py-4">Prix</th>
                            <th class="px-6 py-4">Stock</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-list" class="divide-y divide-gray-100">
                        <!-- Les produits seront injectés ici -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 transform transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-2xl font-bold text-gray-800">Nouveau Produit</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="product-form" onsubmit="handleFormSubmit(event)" class="space-y-4">
                <input type="hidden" id="product-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nom du produit</label>
                    <input type="text" id="nom" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="description" required rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Prix (€)</label>
                        <input type="number" step="0.01" id="prix" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quantité</label>
                        <input type="number" id="quantite" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-semibold">Annuler</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/products';

        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                renderProducts(products);
                updateStats(products);
            } catch (error) {
                console.error('Erreur lors de la récupération des produits:', error);
            }
        }

        function renderProducts(products) {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            
            products.forEach(p => {
                list.innerHTML += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 font-semibold text-gray-800">${p.nom}</td>
                        <td class="px-6 py-4 text-gray-500 max-w-xs truncate">${p.description}</td>
                        <td class="px-6 py-4 font-mono text-indigo-600 font-bold">${p.prix.toFixed(2)} €</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${p.quantite < 5 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                ${p.quantite} en stock
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right flex justify-end gap-2">
                            <button onclick='editProduct(${JSON.stringify(p)})' class="text-blue-500 hover:text-blue-700 p-2"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteProduct(${p.id})" class="text-red-500 hover:text-red-700 p-2"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function updateStats(products) {
            document.getElementById('total-products').innerText = products.length;
            const value = products.reduce((acc, p) => acc + (p.prix * p.quantite), 0);
            document.getElementById('total-value').innerText = value.toFixed(2) + ' €';
            const low = products.filter(p => p.quantite < 5).length;
            document.getElementById('low-stock').innerText = low;
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('product-id').value;
            const product = {
                nom: document.getElementById('nom').value,
                description: document.getElementById('description').value,
                prix: parseFloat(document.getElementById('prix').value),
                quantite: parseInt(document.getElementById('quantite').value)
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                closeModal();
                fetchProducts();
            } catch (error) {
                console.error('Erreur lors de l\'enregistrement:', error);
            }
        }

        async function deleteProduct(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce produit ?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchProducts();
            }
        }

        function editProduct(p) {
            document.getElementById('modal-title').innerText = 'Modifier le Produit';
            document.getElementById('product-id').value = p.id;
            document.getElementById('nom').value = p.nom;
            document.getElementById('description').value = p.description;
            document.getElementById('prix').value = p.prix;
            document.getElementById('quantite').value = p.quantite;
            openModal();
        }

        function openModal() {
            if (!document.getElementById('product-id').value) {
                document.getElementById('modal-title').innerText = 'Nouveau Produit';
                document.getElementById('product-form').reset();
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('product-id').value = '';
            document.getElementById('product-form').reset();
        }

        // Chargement initial
        fetchProducts();
    </script>
</body>
</html>
